    html,
    body,
    div,
    span,
    h1,
    p,
    a,
    img,
    form,
    label {
        margin: 0;
        padding: 0;
        border: 0;
        outline: 0;
        font-size: 98%;
        vertical-align: baseline;
        background: transparent
    }

    body {
        line-height: 1.4em;
        font-family: "Open Sans", "lucida grande", tahoma, verdana, arial, sans-serif;
        color: #444444;
        direction: ltr;
        margin: 0 auto;
        padding: 0;
        text-align: left;
        unicode-bidi: embed
    }

        margin-bottom: 30px;
        padding: 0;

        -webkit-box-sizing: border-box;
        -moz-box-sizing: border-box;
        -o-box-sizing: border-box;
        -ms-box-sizing: border-box
    }

        padding-left: 30px
    }

    a:link,
    a:visited {
        cursor: pointer;
        color: #336F9D;
        text-decoration: none
    }

        opacity: 0.7;
        text-decoration: none
    }
