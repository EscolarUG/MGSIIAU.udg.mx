    function revisaCarrera(p_liga){
      if (p_liga.href.lastIndexOf("majrp") > 0){

        carrera_c = select_c.substr(0, select_c.indexOf("-"));
        cicloa_c = select_c.substr(select_c.indexOf("-")+1);
        string_ciclo = "";
        if (p_liga.href.indexOf("cicloap") >= 0){
          string_ciclo = "&cicloap="+cicloa_c;
        }
        string_carrera = "&majrp="+carrera_c+string_ciclo;
        p_liga.href = p_liga.href.substr(0, p_liga.href.lastIndexOf("majrp")-1)+string_carrera;
      }
    }
