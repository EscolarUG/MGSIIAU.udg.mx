  <script type="text/javascript">

  
  function ajaxInicia() {
    var xmlHttp;

    if (window.XMLHttpRequest) { // Mozilla, Safari,...
            xmlHttp = new XMLHttpRequest();
        } else if (window.ActiveXObject) { // IE
            try {
                xmlHttp = new ActiveXObject("Msxml2.XMLHTTP");
            } catch (e) {
                try {
                    xmlHttp = new ActiveXObject("Microsoft.XMLHTTP");
                } catch (e) {}
            }
        }

        if (!xmlHttp) {
            alert("Falla :( No es posible crear una instancia XMLHTTP");
            return false;
        }

        return xmlHttp;

  }
  

  function preparaParams(xmlHttp, params){
    xmlHttp.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
    xmlHttp.setRequestHeader("Content-length", params.length);
    xmlHttp.setRequestHeader("Connection", "close");
    xmlHttp.send(params);
  }

  function campoAjax(campoId, pagina, params){
    var xmlHttp = ajaxInicia();
    if (xmlHttp){
      xmlHttp.onreadystatechange=function(){
        if(xmlHttp.readyState==4 && xmlHttp.status == 200){
          var respText = xmlHttp.responseText;
          var pos = respText.toUpperCase().indexOf("<SCRIPT");
          //Obtiene el codigo HTML
          if (pos >= 0){
            htmlText = respText.substr(0, pos);
            var pos2 = respText.toUpperCase().indexOf(">", pos);
            var pos3 = respText.toUpperCase().indexOf("</SCRIPT", pos2);
            pos3 = (pos3-1)-pos2;
            //Obtiene el codigo javascript a ejecutarse
            scriptText = respText.substr(pos2+1, pos3);
            document.getElementById(campoId).innerHTML = htmlText;
            eval(scriptText);
          }else{
            document.getElementById(campoId).innerHTML = respText;
          }
        }
      }
      xmlHttp.open("POST", pagina, false);
      preparaParams(xmlHttp, params);
    }else{
      return false;
    }
  }

  </script>
